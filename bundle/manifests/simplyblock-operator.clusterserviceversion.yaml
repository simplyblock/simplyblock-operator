    capabilities: Basic Install
    operators.operatorframework.io/builder: operator-sdk-v1.42.2
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
  name: simplyblock-operator.v0.1.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: Represents a physical or virtual storage device managed by a Simplyblock node.
      displayName: Device
      kind: Device
      name: devices.storage.simplyblock.io
      version: v1alpha1
    - description: Represents a logical volume (Lvol) provisioned within a Simplyblock storage pool.
      displayName: Lvol
      kind: Lvol
      name: lvols.storage.simplyblock.io
      version: v1alpha1
    - description: Represents a Simplyblock storage pool that groups devices and exposes StorageClasses.
      displayName: Pool
      kind: Pool
      name: pools.storage.simplyblock.io
      version: v1alpha1
    - description: Configures periodic snapshot replication between two Simplyblock storage clusters.
      displayName: SnapshotReplication
      kind: SnapshotReplication
      name: snapshotreplications.storage.simplyblock.io
      version: v1alpha1
    - description: Triggers and tracks a point-in-time backup of a PVC-backed Simplyblock volume.
      displayName: StorageBackup
      kind: StorageBackup
      name: storagebackups.storage.simplyblock.io
      version: v1alpha1
    - description: Defines and manages a Simplyblock storage cluster and its control-plane lifecycle.
      displayName: StorageCluster
      kind: StorageCluster
      name: storageclusters.storage.simplyblock.io
      version: v1alpha1
    - description: Represents a single Simplyblock storage node and manages its DaemonSet and RBAC.
      displayName: StorageNode
      kind: StorageNode
      name: storagenodes.storage.simplyblock.io
      version: v1alpha1
    - description: Tracks an asynchronous task running against the Simplyblock control-plane API.
      displayName: Task
      kind: Task
      name: tasks.storage.simplyblock.io
      version: v1alpha1
  description: >
    The Simplyblock Operator manages the full lifecycle of Simplyblock storage clusters
    on Kubernetes — provisioning storage clusters, nodes, pools, logical volumes, devices,
    snapshots, backups, and snapshot replication. It reconciles the desired state declared
    via custom resources against the Simplyblock control-plane API.
  displayName: Simplyblock Operator
  icon:
  - base64data: ""
    mediatype: ""
