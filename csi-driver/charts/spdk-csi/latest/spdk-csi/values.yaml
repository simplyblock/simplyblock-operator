---
driverName: csi.simplyblock.io

image:
  csi:
    repository: quay.io/simplyblock-io/spdkcsi
    tag: v26.2.6
    pullPolicy: Always
  csiProvisioner:
    repository: quay.io/simplyblock-io/csi-provisioner
    tag: v5.1.0
    pullPolicy: Always
  csiAttacher:
    repository: quay.io/simplyblock-io/csi-attacher
    tag: v4.7.0
    pullPolicy: Always
  nodeDriverRegistrar:
    repository: quay.io/simplyblock-io/csi-node-driver-registrar
    tag: v2.12.0
    pullPolicy: Always
  csiSnapshotter:
    repository: quay.io/simplyblock-io/csi-snapshotter
    tag: v8.2.0
    pullPolicy: Always
  csiResizer:
    repository: quay.io/simplyblock-io/csi-resizer
    tag: v1.12.0
    pullPolicy: Always
  csiHealthMonitor:
    repository: quay.io/simplyblock-io/csi-external-health-monitor-controller
    tag: v0.14.0
    pullPolicy: Always
  csiSnapshotterController:
    repository: quay.io/simplyblock-io/snapshot-controller
    tag: v8.2.0
    pullPolicy: Always
  simplyblock:
    repository: quay.io/simplyblock-io/simplyblock
    tag: "26.2.6-PRE"
    pullPolicy: Always
  storageNode:
    repository: quay.io/simplyblock-io/storage-node-handler
    tag: v0.1.9
    pullPolicy: Always
  numaResource:
    repository: quay.io/simplyblock-io/numa-resource-plugin
    tag: latest
    pullPolicy: Always
  mgmtAPI:
    repository: quay.io/simplyblock-io/python
    tag: "3.10"
    pullPolicy: Always
serviceAccount:
  # Specifies whether a serviceAccount should be created
  create: true

rbac:
  # Specifies whether RBAC resources should be created
  create: true

controller:
  replicas: 1
  serviceAccountAuth:
    # When enabled, the CSI driver authenticates with the simplyblock API using
    # the pod's Kubernetes service account JWT instead of the static cluster_secret.
    # The service account must be added to SB_K8S_ADMIN_SERVICE_ACCOUNTS on the
    # simplyblock control plane: system:serviceaccount:<namespace>:simplyblock-csi-controller-sa
    enabled: false
  tolerations:
    create: false
    list:
    - operator: Exists
      effect:
      key:
      value:
  nodeSelector:
    create: false
    key:
    value:

storageclass:
  create: true
  volumeBindingMode: WaitForFirstConsumer
  zoneClusterMap: {}
  allowedTopologyZones: []
  annotations: {}
  # example:
  # annotations:
  #   simplyblock.io/auto-restart-on-pathloss: "true"  

snapshotclass:
  create: true

snapshotcontroller:
  create: true

externallyManagedConfigmap:
  # Specifies whether a externallyManagedConfigmap should be created
  create: true

externallyManagedSecret:
  # Specifies whether a externallyManagedSecret should be created
  create: true

spdkdev:
  # Specifies whether a spdkdev should be created
  create: false

# Configuration for the CSI to connect to the cluster
csiConfig:
  simplybk:
    uuid:
    ip:

# Configuration for the csiSecret
csiSecret:
  simplybk:
    secret:

logicalVolume:
  pool_name: testing1
  qos_rw_iops: "0"
  qos_rw_mbytes: "0"
  qos_r_mbytes: "0"
  qos_w_mbytes: "0"
  max_size: "0"
  compression: "False"
  encryption: "False"
  replicate: "False"
  numDataChunks: "1"
  numParityChunks: "1"
  lvol_priority_class: "0"
  max_namespace_per_subsys: "1"
  tune2fs_reserved_blocks: "0"
  # xfs_su and xfs_sw set the XFS stripe unit/width (mkfs.xfs -d su=,sw=).
  # Both must be set together; if unset here, the CSI driver defaults to su=16k, sw=1.
  xfs_su: ""
  xfs_sw: ""
  fabric: tcp

podAnnotations: {}

# SimplyBlock Daemonset, Deployment, Statefulset annotations
simplyBlockAnnotations: {}

benchmarks: 0

# FIXME: this will not work if there are group of nodes with different AMI types like: AL2, AL2023
# AL2_x86_64: eth0
# AL2023_x86_64_STANDARD: ens5

# not recommended to use it in production, use it only for testing purposes
# automatic cluster activate is disabled by default because of core isolation
# set this to true if you want to activate the cluster automatically after the NDCS + NPCS + 1 storage nodes ares up and running.
autoClusterActivate: false 

node:
  serviceAccountAuth:
    # When enabled, the CSI node DaemonSet authenticates with the simplyblock API using
    # the pod's Kubernetes service account JWT instead of the static cluster_secret.
    # The service account must be added to SB_K8S_ADMIN_SERVICE_ACCOUNTS on the
    # simplyblock control plane: system:serviceaccount:<namespace>:simplyblock-csi-node-sa
    enabled: false
  tolerations:
    create: false
    list:
    - operator: Exists
      effect:
      key:
      value:
  nodeSelector:
    create: false
    key:
    value:

storagenode:
  create: false
  ifname: eth0
  numDataChunks: "1"
  numParityChunks: "1"
  spdkImage:
  spdkProxyImage:
  maxLogicalVolumes: 10
  maxSnapshots: 10
  maxSize:
  numPartitions: 1
  isolateCores: false
  journalManager:
  dataNic:
  pciAllowed:
  pciBlocked:
  deviceNames:
  format4k: false
  socketsToUse: 
  nodesPerSocket:
  deviceModel:
  sizeRange:
  coresPercentage:
  ubuntuHost: false
  enableCpuTopology: false
  enableDevicePlugin: true
  skipKubeletConfiguration: false
  openShiftCluster: false
  reservedSystemCpu:
  multiCluster:
    enable: false
    clusters:
    - cluster_id: 
      secret:
      workers:
  daemonsets:
  - name: simplyblock-storage-node-ds
    appLabel: storage-node
    nodeSelector:
      key: io.simplyblock.node-type
      value: simplyblock-storage-plane
    tolerations:
      create: false
      list:
      - operator: Exists
        effect:
        key: 
        value:
  - name: simplyblock-storage-node-ds-restart
    appLabel: storage-node-restart
    nodeSelector:
      key: io.simplyblock.node-type
      value: simplyblock-storage-plane-restart
    tolerations:
      create: false
      list:
      - operator: Exists
        effect:
        key: 
        value:
      

tls:
  enabled: false

  # Provider responsible for issuing serving certificates. One of: openshift, cert-manager. Required if enabled.
  provider: cert-manager

  # Required if provider == cert-manager. Names a pre-existing ClusterIssuer
  # which is used to mint the chart's own CA Certificate.
  cert-manager:
    cluster-issuer: ""
    # Namespace where cert-manager is installed. The chart's CA secret is placed
    # here so that the ClusterIssuer can locate it (ClusterIssuers always read CA
    # secrets from the cert-manager controller namespace).
    namespace: cert-manager

  # Mutual TLS (clients present and verify certificates). Only allowed when provider == cert-manager.
  mutual_enabled: false
