                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              corePercentage:
                description: CorePercentage is the percentage of cores to be used
                  for spdk (0-99).
                format: int32
                type: integer
              dataIfname:
                description: DataIfname lists data-plane network interfaces.
                items:
                  type: string
                type: array
              deviceNames:
                description: DeviceNames explicitly defines a comma separated list
                  of nvme namespace names like nvme0n1,nvme1n1...
                items:
                  type: string
                type: array
              driveSizeRange:
                description: DriveSizeRange filters devices by size range.
                type: string
              enableCpuTopology:
                description: EnableCpuTopology enables topology-aware CPU handling.
                type: boolean
              forceFormat4K:
                description: ForceFormat4K forces 4K blocksize formatting of the NVMe
                  device where supported.
                type: boolean
                x-kubernetes-validations:
                - message: field is immutable
                  rule: self == oldSelf
              imagePullPolicy:
                description: ImagePullPolicy controls when the container image is
                  pulled. Defaults to IfNotPresent.
                enum:
                - Always
                - Never
                - IfNotPresent
                type: string
              initContainerResources:
                description: |-
                  InitContainerResources sets CPU and memory requests/limits for the init container.
                  When omitted no limits are enforced.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              journalManager:
                description: JournalManagerSpec configures journal manager behavior.
                properties:
                  count:
                    description: Count is the number of journal managers to configure.
                    format: int32
                    type: integer
                  percentPerDevice:
                    description: PercentPerDevice is the journal manager capacity
                      percentage per device.
                    format: int32
                    type: integer
                type: object
              maxLogicalVolumeCount:
                description: MaxLogicalVolumeCount is the maximum number of logical
                  volumes per node.
                format: int32
                type: integer
              maxParallelNodeAdds:
                default: 1
                description: |-
                  MaxParallelNodeAdds limits how many non-FDB worker nodes can be in the
                  add process simultaneously. Defaults to 1 (fully sequential).
                  FDB workers are always sequential regardless of this setting.
                format: int32
                minimum: 1
                type: integer
              maxSize:
                description: MaxSize is the maximum allocatable size of huge pages.
                type: string
              mgmtIfname:
                description: MgmtIfname is the management interface name used by storage
                  nodes.
                type: string
                x-kubernetes-validations:
                - message: field is immutable
                  rule: self == oldSelf
              nodeConfigs:
                additionalProperties:
                  description: |-
                    StorageNodeOverrides holds per-node configuration that overrides the parent
                    StorageNodeSet fleet defaults for a specific worker node. Populated by the
                    StorageNodeSetReconciler from StorageNodeSet.spec.nodeConfigs[workerNode] on
                    every reconcile. The StorageNodeSet is the single source of truth — users
                    should not edit this struct directly on the StorageNode.

                    Fields here mirror the configurable (non-immutable, non-infrastructure) fields
                    of StorageNodeSetSpec. When a field is set here it takes precedence over the
                    fleet default; when omitted the fleet default applies.
                  properties:
                    corePercentage:
                      description: CorePercentage overrides the percentage of cores
                        allocated to SPDK for this node (0-99).
                      format: int32
                      type: integer
                    deviceNames:
                      description: |-
                        DeviceNames explicitly defines the NVMe namespace names to use on this node
                        (e.g. ["nvme0n1","nvme1n1"]).
                      items:
                        type: string
                      type: array
                    driveSizeRange:
                      description: DriveSizeRange overrides the drive size range filter
                        for this node.
                      type: string
                    enableCpuTopology:
                      description: EnableCpuTopology overrides topology-aware CPU
                        handling for this node.
                      type: boolean
                    failureDomain:
                      description: |-
                        FailureDomain is the failure-domain group index (≥ 1) for this node.
                        Required when the parent StorageCluster has enableFailureDomains=true.
                        Overrides StorageNodeSet.spec.nodeFailureDomains[workerNode] when both are set.
                      format: int32
                      minimum: 1
                      type: integer
                    journalManager:
                      description: JournalManagerSpec overrides journal manager tuning
                        for this node.
                      properties:
                        count:
                          description: Count is the number of journal managers to
                            configure.
                          format: int32
                          type: integer
                        percentPerDevice:
                          description: PercentPerDevice is the journal manager capacity
                            percentage per device.
                          format: int32
                          type: integer
                      type: object
                    maxLogicalVolumeCount:
                      description: MaxLogicalVolumeCount overrides the maximum number
                        of logical volumes for this node.
                      format: int32
                      type: integer
                    maxSize:
                      description: MaxSize overrides the maximum allocatable size
                        of huge pages for this node.
                      type: string
                    pcieAllowList:
                      description: PcieAllowList overrides the list of PCI addresses
                        allowed for use on this node.
                      items:
                        type: string
                      type: array
                    pcieDenyList:
                      description: PcieDenyList overrides the list of PCI addresses
                        excluded from use on this node.
                      items:
                        type: string
                      type: array
                    pcieModel:
                      description: PcieModel overrides the PCI model filter for this
                        node.
                      type: string
                    reservedSystemCPU:
                      description: ReservedSystemCPU overrides the CPUs reserved for
                        system workloads on this node.
                      type: string
                    skipKubeletConfiguration:
                      description: |-
                        SkipKubeletConfiguration overrides whether kubelet configuration changes are
                        skipped for this node.
                      type: boolean
                    spdkImage:
                      description: SpdkImage overrides the SPDK image for this node
                        (e.g. for phased rollouts).
                      type: string
                    spdkProxyImage:
                      description: SpdkProxyImage overrides the SPDK proxy image for
                        this node.
                      type: string
                    spdkSystemMemory:
                      description: |-
                        SpdkSystemMemory overrides the SPDK huge-page memory allocation for this node
                        (e.g. "4G", "512M").
                      pattern: ^[0-9]+(G|GI|GB|GiB|M|MI|MB|MiB|g|gi|gb|gib|m|mi|mb|mib)?$
                      type: string
                    ubuntuHost:
                      description: UbuntuHost overrides the Ubuntu host OS flag for
                        this node.
                      type: boolean
                  type: object
                description: |-
                  NodeConfigs allows per-worker-node configuration overrides keyed by the
                  Kubernetes worker node name. Entries are propagated to the corresponding
                  StorageNode.spec.overrides by the StorageNodeReconciler on every reconcile.
                  The StorageNodeSet is the single source of truth for all per-node config,
                  including failure domain assignment via nodeConfigs[worker].failureDomain.
                type: object
              nodeFailureDomains:
                additionalProperties:
                  format: int32
                  type: integer
                description: |-
                  NodeFailureDomains assigns each worker node to a failure-domain group (integer ≥ 1).
                  Required when the referenced StorageCluster has enableFailureDomains=true.
                  Keys are Kubernetes worker node names; values are the failure-domain group index.
                  Each node in the same physical failure domain (rack, AZ, power unit) should share
                  the same group index so the control plane can spread erasure-coding chunks across
                  independent fault groups.
                type: object
              nodesPerSocket:
                description: NodesPerSocket defines how many storage nodes are created
                  per NUMA socket.
                format: int32
                type: integer
                x-kubernetes-validations:
                - message: field is immutable
                  rule: self == oldSelf
              openShiftCluster:
                description: OpenShiftCluster indicates OpenShift-specific behavior
                  should be enabled.
                type: boolean
              openShiftMachineConfigPool:
                description: |-
                  OpenShiftMachineConfigPool is the name of the MachineConfigPool that storage nodes belong to.
                  Generated MachineConfig resources will carry the machineconfiguration.openshift.io/role label
                  set to this value. Defaults to "worker" when unset.
                type: string
              partitions:
                description: Partitions is the number of partitions created per backend
                  storage device.
                format: int32
                type: integer
                x-kubernetes-validations:
                - message: field is immutable
                  rule: self == oldSelf
              pcieAllowList:
                description: PcieAllowList is the list of PCI addresses allowed for
                  use.
                items:
                  type: string
                type: array
              pcieDenyList:
                description: PcieDenyList is the list of PCI addresses excluded from
                  use.
                items:
                  type: string
                type: array
              pcieModel:
                description: PcieModel filters devices by PCI model.
                type: string
              reservedSystemCPU:
                description: ReservedSystemCPU defines CPUs reserved for system workloads.
                type: string
              skipKubeletConfiguration:
                description: SkipKubeletConfiguration skips kubelet configuration
                  changes.
                type: boolean
              socketsToUse:
                description: SocketsToUse restricts deployment to selected NUMA sockets.
                items:
                  type: string
                type: array
              spdkImage:
                description: |-
                  SpdkImage is the SPDK image reference used by node services.
                  Must reference one of the trusted registries (quay.io/simplyblock-io, docker.io/simplyblock, public.ecr.aws/simply-block); digest pinning (@sha256:...) is recommended.
                pattern: ^($|(quay\.io/simplyblock-io|docker\.io/simplyblock|public\.ecr\.aws/simply-block)/[a-z0-9][a-z0-9._-]*:[a-zA-Z0-9][a-zA-Z0-9._-]*(@sha256:[a-f0-9]{64})?)$
                type: string
              spdkProxyImage:
                description: |-
                  SpdkProxyImage is the SPDK proxy image reference used by node services.
                  Must reference one of the trusted registries (quay.io/simplyblock-io, docker.io/simplyblock, public.ecr.aws/simply-block); digest pinning (@sha256:...) is recommended.
                pattern: ^($|(quay\.io/simplyblock-io|docker\.io/simplyblock|public\.ecr\.aws/simply-block)/[a-z0-9][a-z0-9._-]*:[a-zA-Z0-9][a-zA-Z0-9._-]*(@sha256:[a-f0-9]{64})?)$
                type: string
              spdkSystemMemory:
                description: |-
                  SpdkSystemMemory is the amount of memory reserved for SPDK system use (e.g. "4G", "512M").
                  When omitted the backend default is used.
                pattern: ^[0-9]+(G|GI|GB|GiB|M|MI|MB|MiB|g|gi|gb|gib|m|mi|mb|mib)?$
                type: string
              tolerations:
                description: Tolerations configures pod tolerations for storage-node
                  pods.
                items:
                  description: |-
                    The pod this Toleration is attached to tolerates any taint that matches
                    the triple <key,value,effect> using the matching operator <operator>.
                  properties:
                    effect:
                      description: |-
                        Effect indicates the taint effect to match. Empty means match all taint effects.
                        When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: |-
                        Key is the taint key that the toleration applies to. Empty means match all taint keys.
                        If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                      type: string
                    operator:
                      description: |-
                        Operator represents a key's relationship to the value.
                        Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                        Exists is equivalent to wildcard for value, so that a pod can
                        tolerate all taints of a particular category.
                        Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                      type: string
                    tolerationSeconds:
                      description: |-
                        TolerationSeconds represents the period of time the toleration (which must be
                        of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                        it is not set, which means tolerate the taint forever (do not evict). Zero and
                        negative values will be treated as 0 (evict immediately) by the system.
                      format: int64
                      type: integer
                    value:
                      description: |-
                        Value is the taint value the toleration matches to.
                        If the operator is Exists, the value should be empty, otherwise just a regular string.
                      type: string
                  type: object
                type: array
              ubuntuHost:
                description: UbuntuHost indicates the node host OS is Ubuntu.
                type: boolean
              workerNodes:
                description: WorkerNodes is the set of Kubernetes worker nodes to
                  manage.
                items:
                  type: string
                type: array
            required:
            - clusterName
            type: object
            x-kubernetes-validations:
            - message: field mgmtIfname is immutable once set
              rule: '!has(oldSelf.mgmtIfname) || has(self.mgmtIfname)'
            - message: field partitions is immutable once set
              rule: '!has(oldSelf.partitions) || has(self.partitions)'
            - message: field nodesPerSocket is immutable once set
              rule: '!has(oldSelf.nodesPerSocket) || has(self.nodesPerSocket)'
            - message: field forceFormat4K is immutable once set
              rule: '!has(oldSelf.forceFormat4K) || has(self.forceFormat4K)'
          status:
            description: status defines the observed state of StorageNodeSet
            properties:
              drainCoordination:
                description: DrainCoordination tracks the upgrade-drain state per
                  worker node.
                items:
                  description: NodeDrainState tracks the upgrade-drain coordination
                    state for a single worker node.
                  properties:
                    activeNodeUUID:
                      description: |-
                        ActiveNodeUUID is the backend UUID of the storage node currently being shut
                        down or restarted. Used to sequence through multiple NUMA-socket nodes on
                        the same worker one at a time during drain coordination.
                      type: string
                    hostname:
                      description: Hostname is the Kubernetes node name.
                      type: string
                    message:
                      description: Message provides additional status detail or error
                        information.
                      type: string
                    phase:
                      description: Phase is the current drain coordination phase.
                      enum:
                      - detected
                      - shutdown_called
                      - draining
                      - restart_called
                      - complete
                      - failed
                      type: string
                    startedAt:
                      description: StartedAt is when drain coordination began for
                        this node.
                      format: date-time
                      type: string
                  required:
                  - hostname
                  - phase
                  - startedAt
                  type: object
                type: array
              latencyMetrics:
                description: LatencyMetrics holds per-backend-node fio-measured latency
                  data for rebalancing decisions.
                items:
                  description: |-
                    NodeLatencyMetrics holds fio-measured 4K NVMe-oF latency for a single backend storage node.
                    The benchmark volume NQN and connection details are derived at runtime from the node UUID
                    and the cluster NQN — they are not stored here.
                  properties:
                    baselineMeasuredAt:
                      description: BaselineMeasuredAt is when the baseline was established.
                      format: date-time
                      type: string
                    baselineP50NS:
                      description: BaselineP50NS is the p50 write latency (nanoseconds)
                        from the initial empty-cluster benchmark.
                      format: int64
                      type: integer
                    baselineP99NS:
                      description: BaselineP99NS is the p99 write latency (nanoseconds)
                        from the initial empty-cluster benchmark.
                      format: int64
                      type: integer
                    nodeUUID:
                      description: NodeUUID is the backend storage node UUID.
                      type: string
                  required:
                  - nodeUUID
                  type: object
                type: array
              nodes:
                description: Nodes is the observed state of each managed storage node.
                items:
                  properties:
                    cpu:
                      description: CPU is the reported CPU allocation/count for the
                        node.
                      format: int32
                      type: integer
                    devices:
                      description: Devices is the backend summary of devices on this
                        node.
                      type: string
                    health:
                      description: Health indicates whether health checks are currently
                        passing.
                      type: boolean
                    hostname:
                      description: Hostname is the Kubernetes node hostname.
                      type: string
                    lvolPort:
                      description: LvolPort is the logical-volume subsystem port.
                      format: int32
                      type: integer
                    memory:
                      description: Memory is the reported memory value.
                      type: string
                    mgmtIp:
                      description: MgmtIp is the management IP address for the node.
                      type: string
                    nvmfPort:
                      description: NvmfPort is the NVMf service port.
                      format: int32
                      type: integer
                    postedAt:
                      description: |-
                        PostedAt is when the storage-node add request was sent. Used to detect
                        timeout without blocking the reconcile goroutine.
                      format: date-time
                      type: string
                    rpcPort:
                      description: RpcPort is the node RPC service port.
                      format: int32
                      type: integer
                    status:
                      description: Status is the backend lifecycle state for the node.
                      type: string
                    uptime:
                      description: Uptime is the reported node uptime value.
                      type: string
                    uuid:
                      description: UUID is the backend node UUID.
                      type: string
                    volumes:
                      description: Volumes is the current logical volume count.
                      format: int32
                      type: integer
                  type: object
                type: array
              offlineNodes:
                description: OfflineNodes is the count of StorageNode CRs with status
                  "offline" or "suspended".
                type: integer
              onlineNodes:
                description: OnlineNodes is the count of StorageNode CRs with status
                  "online".
                type: integer
              pendingNodeAdds:
                additionalProperties:
                  format: date-time
                  type: string
                description: |-
                  PendingNodeAdds records the timestamp when a node-add POST was sent for
                  each worker hostname. Entries are removed only when all socket nodes for
                  that worker come online. This is the authoritative guard against duplicate
                  POSTs — it is a separate map field so patches to Status.Nodes never
                  inadvertently delete it.
                type: object
              schedulingFailedWorkers:
                additionalProperties:
                  type: boolean
                description: |-
                  SchedulingFailedWorkers tracks worker hostnames whose SPDK pod experienced
                  a FailedScheduling event during node add. Used to emit a recovery event
                  when the node subsequently comes online.
                type: object
              totalNodes:
                description: TotalNodes is the total number of owned StorageNode CRs.
                type: integer
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: nodeUUID is required when action is specified
          rule: '!(has(self.spec.action) && self.spec.action != "" && (!has(self.spec.nodeUUID)
            || self.spec.nodeUUID == ""))'
        - message: maxLogicalVolumeCount, workerNodes, and mgmtIfname are required
            when action is not specified
          rule: (has(self.spec.action) && self.spec.action != "") || (has(self.spec.maxLogicalVolumeCount)
            && has(self.spec.workerNodes) && size(self.spec.workerNodes) > 0 && has(self.spec.mgmtIfname)
            && self.spec.mgmtIfname != "")
        - message: all nodeFailureDomains values must be >= 1 (failure-domain group
            index)
          rule: '!has(self.spec.nodeFailureDomains) || self.spec.nodeFailureDomains.all(k,
            self.spec.nodeFailureDomains[k] >= 1)'
    served: true
    storage: true
    subresources:
      status: {}
