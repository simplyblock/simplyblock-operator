---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-v1-pod-simplyblock-rebalancer
  failurePolicy: Ignore
  name: simplyblock-rebalancer-injector.simplyblock.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-v1-pvc-simplyblock-placement
  failurePolicy: Ignore
  name: simplyblock-volume-placement-injector.simplyblock.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - persistentvolumeclaims
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-v1-pvc-pinned-volume
  failurePolicy: Fail
  name: pinned-volume-validator.simplyblock.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - persistentvolumeclaims
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-storage-simplyblock-io-v1alpha1-storagenode
  failurePolicy: Fail
  name: vstoragenode.simplyblock.io
  rules:
  - apiGroups:
    - storage.simplyblock.io
    apiVersions:
    - v1alpha1
    operations:
    - UPDATE
    resources:
    - storagenodes
  sideEffects: None
