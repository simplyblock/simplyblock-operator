# Aggregates read-only access to storage.simplyblock.io CRs into the built-in
# Kubernetes "view" ClusterRole. Anyone already bound to "view" in a namespace
# (or cluster-wide) inherits get/list/watch on StorageClusters and Pools.
#
# This role exists so that namespace tenants don't need extra bindings just to
# see the simplyblock resources in their own namespace. Per-resource scoping
# (e.g. resourceNames: [foo]) and any kind of mutation require additional roles
# defined by the cluster admin.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: simplyblock-aggregate-to-view
  labels:
    app.kubernetes.io/name: simplyblock-operator
    app.kubernetes.io/managed-by: kustomize
    rbac.authorization.k8s.io/aggregate-to-view: "true"
rules:
- apiGroups:
  - storage.simplyblock.io
  resources:
  - storageclusters
  - pools
  - storageclusters/status
  - pools/status
  verbs:
  - get
  - list
  - watch
