{{- if .Values.externallyManagedConfigmap }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: simplyblock-csi-cm
data:
  # uuid: the simplyblock cluster UUID
  # ip: the management IP of the simplyblock cluster
  # targetAddr: target service IP
  config.json: |-
{{ toJson .Values.csiConfig | indent 4 -}}
{{- end }}

{{- if .Values.storagenode.create }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: simplyblock-clusters
data:
  clusters.json: |
    {
      "clusters": [
{{- if .Values.storagenode.multiCluster.enable }}
{{- $clusters := default (list) .Values.storagenode.multiCluster.clusters -}}
{{- range $i, $c := $clusters }}
        {{- if $i }},{{ end }}
        {
          "cluster_id": {{ required "storagenode.multiCluster.clusters[].cluster_id is required" $c.cluster_id | quote }},
          "workers": {{ toJson (default (list) $c.workers) }}
        }
{{- end }}
{{- else }}
        {
          "cluster_id": {{ .Values.csiConfig.simplybk.uuid | quote }},
          "workers": []
        }
{{- end }}
      ]
    }
{{- end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: simplyblock-caching-node-restart-script-cm
data:
  restart_script.py: |
    import json, os, requests

    secret = json.loads(os.getenv("SPDKCSI_SECRET"))
    cluster_secret = secret['simplybk']['secret']

    cluster_config = json.loads(os.getenv("CLUSTER_CONFIG"))
    cluster_uuid = cluster_config['simplybk']['uuid']
    cluster_ip = cluster_config['simplybk']['ip']
    hostname = os.getenv('HOSTNAME')
    hostname = hostname.split(".")[0]

    url = f'{cluster_ip}/cachingnode/recreate/{hostname}'
    headers = {
        'Authorization': f'{cluster_uuid} {cluster_secret}'
    }

    print(f"making GET request to: {url}")
    response = requests.get(url, headers=headers)

    print("Response Text:", response.text)
    print("Response Code:", response.status_code)
