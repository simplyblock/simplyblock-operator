{{- if .Values.operator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: simplyblock-operator-webhook-service
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    control-plane: simplyblock-operator
    app: simplyblock-operator
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: simplyblock-operator-mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: simplyblock-operator-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /mutate-v1-pod-simplyblock-rebalancer
  failurePolicy: Ignore
  name: simplyblock-rebalancer-injector.simplyblock.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  sideEffects: None
{{- end }}
