{{- if .Values.operator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: simplyblock-operator-webhook-service
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    app: simplyblock-operator
    control-plane: simplyblock-operator
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: simplyblock-operator-mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: simplyblock-operator-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /mutate-v1-pod-simplyblock-rebalancer
  failurePolicy: Ignore
  name: simplyblock-rebalancer-injector.simplyblock.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: simplyblock-operator-validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: simplyblock-operator-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /validate-v1-pvc-pinned-volume
  failurePolicy: Fail
  matchConditions:
  - expression: has(object.metadata.annotations) && 'simplyblock.io/pinned-volume'
      in object.metadata.annotations
    name: has-pinned-volume-annotation
  name: pinned-volume-validator.simplyblock.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - persistentvolumeclaims
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: simplyblock-operator-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /validate-storage-simplyblock-io-v1alpha1-storagenode
  failurePolicy: Fail
  name: vstoragenode.simplyblock.io
  rules:
  - apiGroups:
    - storage.simplyblock.io
    apiVersions:
    - v1alpha1
    operations:
    - UPDATE
    resources:
    - storagenodes
  sideEffects: None
{{- end }}
