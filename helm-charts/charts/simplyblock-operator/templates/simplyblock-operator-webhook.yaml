{{- if .Values.operator.enabled }}
# Webhook Service + MutatingWebhookConfiguration for the operator's admission
# webhooks (simplyblock-rebalancer-injector, simplyblock-volume-placement-injector).
#
# Names must exactly match internal/utils/constants.go (WebhookServiceName,
# WebhookConfigurationName) — the operator looks these up by hardcoded name to
# provision the self-signed serving certificate and inject its CA bundle
# (internal/webhook/cert.go). This isn't parameterized via env/flag, so keep
# these in sync with that file if either ever changes.
---
apiVersion: v1
kind: Service
metadata:
  name: simplyblock-operator-webhook-service
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    control-plane: simplyblock-operator
    app: simplyblock-operator
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: simplyblock-operator-mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: simplyblock-operator-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /mutate-v1-pod-simplyblock-rebalancer
  failurePolicy: Ignore
  name: simplyblock-rebalancer-injector.simplyblock.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: simplyblock-operator-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /mutate-v1-pvc-simplyblock-placement
  failurePolicy: Ignore
  name: simplyblock-volume-placement-injector.simplyblock.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - persistentvolumeclaims
  sideEffects: None
{{- end }}
