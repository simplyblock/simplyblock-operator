                        Valid operators are Exists and Equal. Defaults to Equal.
                        Exists is equivalent to wildcard for value, so that a pod can
                        tolerate all taints of a particular category.
                      type: string
                    tolerationSeconds:
                      description: |-
                        TolerationSeconds represents the period of time the toleration (which must be
                        of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                        it is not set, which means tolerate the taint forever (do not evict). Zero and
                        negative values will be treated as 0 (evict immediately) by the system.
                      format: int64
                      type: integer
                    value:
                      description: |-
                        Value is the taint value the toleration matches to.
                        If the operator is Exists, the value should be empty, otherwise just a regular string.
                      type: string
                  type: object
                type: array
              ubuntuHost:
                description: UbuntuHost indicates the node host OS is Ubuntu.
                type: boolean
              workerNode:
                description: WorkerNode is a single worker node used by action flows.
                type: string
              workerNodes:
                description: WorkerNodes is the set of Kubernetes worker nodes to
                  manage.
                items:
                  type: string
                type: array
            required:
            - clusterName
            type: object
          status:
            description: status defines the observed state of StorageNode
            properties:
              actionStatus:
                description: ActionStatus tracks the latest action execution status.
                properties:
                  action:
                    description: Action is the requested action name.
                    type: string
                  message:
                    description: Message is a human-readable action result or error.
                    type: string
                  nodeUUID:
                    description: NodeUUID is the target node UUID for the action.
                    type: string
                  observedGeneration:
                    description: ObservedGeneration is the resource generation observed
                      by this status.
                    format: int64
                    type: integer
                  state:
                    type: string
                  triggered:
                    description: Triggered indicates whether the underlying backend
                      action has been fired.
                    type: boolean
                  updatedAt:
                    description: UpdatedAt is the timestamp of the last status transition.
                    format: date-time
                    type: string
                type: object
              drainCoordination:
                description: DrainCoordination tracks the upgrade-drain state per
                  worker node.
                items:
                  description: NodeDrainState tracks the upgrade-drain coordination
                    state for a single worker node.
                  properties:
                    activeNodeUUID:
                      description: |-
                        ActiveNodeUUID is the backend UUID of the storage node currently being shut
                        down or restarted. Used to sequence through multiple NUMA-socket nodes on
                        the same worker one at a time during drain coordination.
                      type: string
                    hostname:
                      description: Hostname is the Kubernetes node name.
                      type: string
                    message:
                      description: Message provides additional status detail or error
                        information.
                      type: string
                    phase:
                      description: Phase is the current drain coordination phase.
                      enum:
                      - detected
                      - shutdown_called
                      - draining
                      - restart_called
                      - complete
                      - failed
                      type: string
                    startedAt:
                      description: StartedAt is when drain coordination began for
                        this node.
                      format: date-time
                      type: string
                  required:
                  - hostname
                  - phase
                  - startedAt
                  type: object
                type: array
              nodes:
                description: Nodes is the observed state of each managed storage node.
                items:
                  properties:
                    cpu:
                      description: CPU is the reported CPU allocation/count for the
                        node.
                      format: int32
                      type: integer
                    devices:
                      description: Devices is the backend summary of devices on this
                        node.
                      type: string
                    health:
                      description: Health indicates whether health checks are currently
                        passing.
                      type: boolean
                    hostname:
                      description: Hostname is the Kubernetes node hostname.
                      type: string
                    lvolPort:
                      description: LvolPort is the logical-volume subsystem port.
                      format: int32
                      type: integer
                    memory:
                      description: Memory is the reported memory value.
                      type: string
                    mgmtIp:
                      description: MgmtIp is the management IP address for the node.
                      type: string
                    nvmfPort:
                      description: NvmfPort is the NVMf service port.
                      format: int32
                      type: integer
                    postedAt:
                      description: |-
                        PostedAt is when the storage-node add request was sent. Used to detect
                        timeout without blocking the reconcile goroutine.
                      format: date-time
                      type: string
                    rpcPort:
                      description: RpcPort is the node RPC service port.
                      format: int32
                      type: integer
                    status:
                      description: Status is the backend lifecycle state for the node.
                      type: string
                    uptime:
                      description: Uptime is the reported node uptime value.
                      type: string
                    uuid:
                      description: UUID is the backend node UUID.
                      type: string
                    volumes:
                      description: Volumes is the current logical volume count.
                      format: int32
                      type: integer
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: nodeUUID is required when action is specified
          rule: '!(has(self.spec.action) && self.spec.action != "" && (!has(self.spec.nodeUUID)
            || self.spec.nodeUUID == ""))'
        - message: maxLogicalVolumeCount, workerNodes, and mgmtIfname are required
            when action is not specified
          rule: (has(self.spec.action) && self.spec.action != "") || (has(self.spec.maxLogicalVolumeCount)
            && has(self.spec.workerNodes) && size(self.spec.workerNodes) > 0 && has(self.spec.mgmtIfname)
            && self.spec.mgmtIfname != "")
    served: true
    storage: true
    subresources:
      status: {}
