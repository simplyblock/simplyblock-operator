# This rule is not used by the project simplyblock-manager itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the simplyblock.simplyblock.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: simplyblock-manager
    app.kubernetes.io/managed-by: kustomize
  name: ssimplyblocktoragenode-editor-role
rules:
- apiGroups:
  - simplyblock.simplyblock.io
  resources:
  - simplyblockstoragenodes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - simplyblock.simplyblock.io
  resources:
  - simplyblockstoragenodes/status
  verbs:
  - get
