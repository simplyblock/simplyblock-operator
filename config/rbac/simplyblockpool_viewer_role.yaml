# This rule is not used by the project simplyblock-manager itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to simplyblock.simplyblock.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: simplyblock-manager
    app.kubernetes.io/managed-by: kustomize
  name: simplyblockpool-viewer-role
rules:
- apiGroups:
  - simplyblock.simplyblock.io
  resources:
  - simplyblockpools
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - simplyblock.simplyblock.io
  resources:
  - simplyblockpools/status
  verbs:
  - get
