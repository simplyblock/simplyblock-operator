---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - simplyblock.simplyblock.io
  resources:
  - pools
  - simplyblockdevices
  - simplyblockstorageclusters
  - storagenodes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - simplyblock.simplyblock.io
  resources:
  - pools/finalizers
  - simplyblockdevices/finalizers
  - simplyblockstorageclusters/finalizers
  - storagenodes/finalizers
  verbs:
  - update
- apiGroups:
  - simplyblock.simplyblock.io
  resources:
  - pools/status
  - simplyblockdevices/status
  - simplyblockstorageclusters/status
  - storagenodes/status
  verbs:
  - get
  - patch
  - update
