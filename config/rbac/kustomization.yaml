resources:
# All RBAC will be applied under this service account in
# the deployment namespace. You may comment out this resource
# if your manager will use a service account that exists at
# runtime. Be sure to update RoleBinding and ClusterRoleBinding
# subjects if changing service account names.
- service_account.yaml
- role.yaml
- role_binding.yaml
- leader_election_role.yaml
- leader_election_role_binding.yaml
# The following RBAC configurations are used to protect
# the metrics endpoint with authn/authz. These configurations
# ensure that only authorized users and service accounts
# can access the metrics endpoint. Comment the following
# permissions if you want to disable this protection.
# More info: https://book.kubebuilder.io/reference/metrics.html
- metrics_auth_role.yaml
- metrics_auth_role_binding.yaml
- metrics_reader_role.yaml
# Aggregate the simplyblock CR verbs into the built-in Kubernetes view/edit/admin
# ClusterRoles. With the namespace-per-cluster convention, binding view/edit/admin
# in a namespace gives that tenant the appropriate level of access to the
# StorageClusters and Pools in their namespace, and nothing outside it.
- aggregate_view_role.yaml
- aggregate_edit_role.yaml
# The Kubebuilder scaffold also produces "Admin", "Editor" and "Viewer" ClusterRoles
# for the remaining CRDs below. Those are not consumed by the operator itself.
# They will be replaced with aggregation roles in a follow-up; until then they
# remain installed for backward compatibility.
- task_admin_role.yaml
- task_editor_role.yaml
- task_viewer_role.yaml
- storagenode_admin_role.yaml
- storagenode_editor_role.yaml
- storagenode_viewer_role.yaml
- storagebackup_admin_role.yaml
- storagebackup_editor_role.yaml
- storagebackup_viewer_role.yaml
