                  import into the target cluster.
                type: string
              message:
                description: Message contains the latest reconciliation detail or
                  error.
                type: string
              phase:
                description: Phase is the high-level lifecycle shown in kubectl output.
                type: string
              sourceClusterUUID:
                description: SourceClusterUUID is the resolved UUID of the source
                  cluster.
                type: string
              storageBackupRef:
                description: |-
                  StorageBackupRef is the name of the StorageBackup CR created in the target namespace
                  after a successful import. This CR can be referenced directly in a BackupRestore.
