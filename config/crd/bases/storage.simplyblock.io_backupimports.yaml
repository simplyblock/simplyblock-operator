    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BackupImport imports a completed backup from a source cluster into a target cluster,
          creating a StorageBackup CR that can be referenced by a BackupRestore.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of BackupImport
            properties:
              sourceBackupID:
                description: SourceBackupID is the UUID of the backup on the source
                  cluster to import.
                pattern: ^[a-zA-Z0-9_-]{1,128}$
                type: string
              sourceClusterName:
                description: SourceClusterName is the StorageCluster CR name of the
                  cluster that owns the backup.
                type: string
              targetClusterName:
                description: TargetClusterName is the StorageCluster CR name of the
                  cluster to import into.
                type: string
            required:
