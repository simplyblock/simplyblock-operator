name: Manifests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  manifests:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kubeconform
        run: |
          curl -fsSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Check generated manifests are up to date
        run: |
          make manifests generate
          git diff --exit-code || (echo "Generated files are out of date. Run 'make manifests generate' and commit the result." && exit 1)

      - name: Build installer
        run: make build-installer

      - name: Validate rendered manifests
        run: |
          kubeconform -strict -summary -skip CustomResourceDefinition dist/install.yaml
