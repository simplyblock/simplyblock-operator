name: Build and Push Bundle Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  BUNDLE_IMAGE_NAME: simplyblock/simplyblock-operator-bundle
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  bundle-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set bundle image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${BUNDLE_IMAGE_NAME}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${BUNDLE_IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push bundle image
        run: |
          make bundle-build bundle-push BUNDLE_IMG=${{ steps.tag.outputs.tag }}
