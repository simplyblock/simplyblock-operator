name: "Helm: Release"

# Packages the simplyblock-operator Helm chart and uploads it as the
# `helm-charts-operator` artifact. It does NOT open a PR or publish anything —
# merging and publishing the unified Helm repo is handled by the repo-global
# release workflow (repo_release.yaml).

on:
  push:
    branches:
      - main
      - 'R[0-9]*'
    paths:
      - 'helm-charts/charts/simplyblock-operator/Chart.yaml'
  workflow_call:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Package chart
        run: |
          VERSION="$(grep '^version:' helm-charts/charts/simplyblock-operator/Chart.yaml | awk '{print $2}' | tr -d '"')"
          mkdir -p "helm-charts/charts/$VERSION"
          helm package helm-charts/charts/simplyblock-operator --destination "helm-charts/charts/$VERSION/"

      - name: Index chart repo
        run: helm repo index helm-charts/charts/ --url https://install.simplyblock.io/helm

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts-operator
          path: helm-charts/charts/
          retention-days: 7
