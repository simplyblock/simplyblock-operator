name: Unit and Sanity Tests

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Tidy Go modules
      run: go mod tidy

    - name: Test
      run: make test SKIP_TESTS=TestSanity

