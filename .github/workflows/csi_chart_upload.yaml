name: CSI Upload Helm Charts

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch/tag/SHA) to upload charts from
        required: false
        default: main
        type: string
      artifact:
        description: If set, upload this workflow artifact instead of the in-repo charts
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      ref:
        required: false
        default: main
        type: string
      artifact:
        description: If set, upload this workflow artifact instead of the in-repo charts
        required: false
        default: ""
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Download charts artifact
        if: ${{ inputs.artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact }}
          path: upload-dir

      - name: Upload merged Helm repo (artifact)
        if: ${{ inputs.artifact != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: /
          local-dir: ./upload-dir/

      - name: Upload Helm Charts (in-repo)
        if: ${{ inputs.artifact == '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: /
          local-dir: ./csi-driver/charts/spdk-csi/
