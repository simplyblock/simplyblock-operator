name: Build and Push Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
env:
  IMAGE_NAME: simplyblock/simplyblock-operator
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build manager binary
        run: make build

      - name: Build and push multi-arch Docker image
        run: |
          IMAGE_TAG=${IMAGE_NAME}:${GITHUB_REF_NAME}
          echo "Building and pushing multi-arch image: $IMAGE_TAG"
          # Use multi-arch Makefile target
          make docker-buildx IMG=$IMAGE_TAG PLATFORMS="linux/amd64,linux/arm64"
