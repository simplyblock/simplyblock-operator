name: Build and Push Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
env:
  IMAGE_NAME: simplyblock/simplyblock-operator
  ECR_IMAGE_NAME: simplyblock-operator
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_GEOFFREY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_GEOFFREY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build manager binary
        run: make build

      - name: Build and push multi-arch Docker image
        run: |
          IMAGE_TAG=${IMAGE_NAME}:${GITHUB_REF_NAME}
          echo "Building and pushing multi-arch image: $IMAGE_TAG"
          make docker-buildx IMG=$IMAGE_TAG PLATFORMS="linux/amd64,linux/arm64"

      - name: Build and push multi-arch ECR image
        run: |
          ECR_IMAGE_TAG=${{ steps.login-ecr.outputs.registry }}/${ECR_IMAGE_NAME}:${GITHUB_REF_NAME}
          echo "Building and pushing multi-arch ECR image: $ECR_IMAGE_TAG"
          make docker-buildx-ecr ECR_IMG=$ECR_IMAGE_TAG PLATFORMS="linux/amd64,linux/arm64"
