# GitHub Action to automate the identification of common misspellings in text files.
# https://github.com/codespell-project/actions-codespell
# https://github.com/codespell-project/codespell
name: "Repo: Codespell"
on:
  push:
    branches: ['main']
  pull_request:

jobs:
  codespell:
    name: Check for spelling errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: codespell-project/actions-codespell@master
        with:
          check_filenames: true
          # Scan every component (operator, atlas-lib, csi-driver, helm-charts) plus
          # top-level files. "." = the whole checkout; the skip list prunes noise.
          path: .
          skip: ./.git,.git,./.github/workflows/repo_codespell.yaml,*.png,*.jpg,*.svg,*.sum,*.tgz,./vendor,go.sum
          # AfterAll: Ginkgo suite node (codespell lowercases it to "afterall")
          ignore_words_list: "browseable,ro,NotIn,afterall"
