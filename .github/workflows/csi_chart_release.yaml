name: "CSI: Release Charts"

# Packages the spdk-csi Helm chart and uploads it as the `helm-charts-csi` artifact.
# It does NOT open a PR or publish anything — merging and publishing the unified
# Helm repo is handled by the repo-global release workflow (repo_release.yaml).

on:
  push:
    branches:
      - main
      - 'R[0-9]*'
    paths:
      - 'csi-driver/charts/spdk-csi/latest/spdk-csi/Chart.yaml'
  workflow_call:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Package chart
        run: |
          cd csi-driver/charts/spdk-csi/latest/
          VERSION="$(grep '^version:' spdk-csi/Chart.yaml | awk '{print $2}' | tr -d '"')"
          helm package spdk-csi
          mkdir -p "../$VERSION"
          mv "spdk-csi-$VERSION.tgz" "../$VERSION/"

      - name: Index chart repo
        run: helm repo index csi-driver/charts/spdk-csi/ --url https://install.simplyblock.io/helm

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts-csi
          path: csi-driver/charts/spdk-csi/
          retention-days: 7
