name: "Operator: Docker Build"

on:
  push:
    branches:
      - "**"
    paths:
      - "operator/**"
      - ".github/workflows/operator_build.yaml"
  workflow_call:
    inputs:
      version:
        description: "Image tag to publish (defaults to the branch ref)"
        required: false
        type: string

jobs:
  build-and-push:
    name: "Build and push (${{ matrix.name }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: operator
            dockerfile: operator/Dockerfile
            image_name: simplyblock/simplyblock-operator
            ecr_image_name: simply-block/simplyblock-operator
            build_args: |
              VERSION=0.1.0
              RELEASE=1
          - name: rebalancer
            dockerfile: operator/Dockerfile.simplyblock-rebalancer
            image_name: simplyblock/simplyblock-rebalancer
            ecr_image_name: simply-block/simplyblock-rebalancer
            build_args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2
        with:
          registry-type: public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Compute image tag
        id: image_tag
        # Docker tags cannot contain "/", but branch names (e.g. feature/foo) can —
        # sanitize before using the ref name as a tag.
        run: |
          version="${{ inputs.version || github.ref_name }}"
          echo "tag=${version//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch ${{ matrix.name }} image (DockerHub + ECR)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.image_name }}:${{ steps.image_tag.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_image_name }}:${{ steps.image_tag.outputs.tag }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
