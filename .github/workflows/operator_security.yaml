name: "Operator: Security Scan"

on:
  push:
    branches:
      - main
    paths:
      - "operator/**"
      - ".github/workflows/operator_security.yaml"
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  scan:
    name: Security Scan (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: operator
            image: simplyblock/simplyblock-operator
            dockerfile: operator/Dockerfile
          - name: simplyblock-rebalancer
            image: simplyblock/simplyblock-rebalancer
            dockerfile: operator/Dockerfile.simplyblock-rebalancer

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image for scanning (linux/amd64 only)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: ${{ matrix.image }}:scan

      # Grype uses Red Hat's Security Data API — much more current than Trivy's OVAL source.
      - name: Run Grype vulnerability scan (Red Hat advisories)
        id: grype
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: ${{ matrix.image }}:scan
          severity-cutoff: medium
          fail-build: true
          only-fixed: true
          output-format: table

      - name: Run Trivy vulnerability scan (Go binary + secrets)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ matrix.image }}:scan
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: '1'
          scanners: vuln,secret

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ matrix.image }}:scan
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ matrix.name }}-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90

      - name: Notify Slack on scan failure
        if: failure()
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: *Security scan failed* — vulnerabilities found in `${{ matrix.image }}`",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Image",    "value": "${{ matrix.image }}", "short": true },
                    { "title": "Branch",   "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit",   "value": "${{ github.sha }}", "short": true },
                    { "title": "Workflow", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                  ]
                }
              ]
            }
