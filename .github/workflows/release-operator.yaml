name: Release (operator bundle)

on:
  release:
    types: [created]

env:
  QUAY_IMAGE_BASE: quay.io/simplyblock-io/simplyblock-operator
  QUAY_REBALANCER_IMAGE_BASE: quay.io/simplyblock-io/simplyblock-rebalancer

jobs:
  release:
    name: Build, Push, and Bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload release assets if desired
    defaults:
      run:
        working-directory: operator

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: operator/go.mod

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Quay.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push multi-arch image to quay.io
        run: |
          make docker-buildx \
            VERSION=${{ steps.version.outputs.version }} \
            IMG_TAG=${{ steps.version.outputs.tag }} \
            PLATFORMS="linux/amd64,linux/arm64"

      - name: Build and push simplyblock-rebalancer multi-arch image to quay.io
        run: |
          make docker-buildx-simplyblock-rebalancer \
            IMG_TAG=${{ steps.version.outputs.tag }} \
            PLATFORMS="linux/amd64,linux/arm64"

      - name: Install operator-sdk
        run: |
          OPERATOR_SDK_VERSION="v1.42.2"
          OPERATOR_SDK_SHA256="8847c45ea994ac62b3cd134f77934df2a16a56a39a634eb988e0d1db99d1a413"
          curl -sLo /usr/local/bin/operator-sdk \
            "https://github.com/operator-framework/operator-sdk/releases/download/${OPERATOR_SDK_VERSION}/operator-sdk_linux_amd64"
          echo "${OPERATOR_SDK_SHA256}  /usr/local/bin/operator-sdk" | sha256sum -c -
          chmod +x /usr/local/bin/operator-sdk
          operator-sdk version

      - name: Install kustomize
        run: |
          make kustomize
          echo "${{ github.workspace }}/operator/bin" >> "$GITHUB_PATH"

      - name: Generate bundle
        run: |
          make bundle \
            VERSION=${{ steps.version.outputs.version }} \
            IMG_TAG=${{ steps.version.outputs.tag }}

      - name: Package bundle as release asset
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          zip -r "bundle-${TAG}.zip" bundle/manifests/ bundle/metadata/

      - name: Attach bundle zip to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release upload "$TAG" "bundle-${TAG}.zip" --clobber

      - name: Upload bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bundle-${{ steps.version.outputs.tag }}
          path: |
            operator/bundle/manifests/
            operator/bundle/metadata/
          retention-days: 90
