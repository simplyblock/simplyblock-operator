name: "Repo: CodeQL"

# CodeQL analysis across all three Go modules in the monorepo. Each module is
# analyzed independently (its own go.mod / go version) via the matrix, and each
# uploads its results under a distinct category so they don't overwrite one another.

on:
  push:
    branches: [main]
    paths:
      - "operator/**"
      - "atlas-lib/**"
      - "csi-driver/**"
      - ".github/workflows/repo_codeql.yaml"
  pull_request:
    paths:
      - "operator/**"
      - "atlas-lib/**"
      - "csi-driver/**"
      - ".github/workflows/repo_codeql.yaml"
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.component }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        component: [operator, atlas-lib, csi-driver]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.component }}/go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: manual

      # Manual build so CodeQL traces exactly one module's compilation, scoping
      # the analysis to that component. Repo-relative paths are preserved.
      - name: Build ${{ matrix.component }}
        working-directory: ${{ matrix.component }}
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go/component:${{ matrix.component }}"
