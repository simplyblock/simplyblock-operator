name: Helm Release

on:
  push:
    branches:
      - main
    paths:
      - 'charts/simplyblock-operator/Chart.yaml'

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.release_meta.outputs.branch }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Extract version and package chart
        run: |
          VERSION="$(grep '^version:' charts/simplyblock-operator/Chart.yaml | awk '{print $2}' | tr -d '"')"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          mkdir -p "charts/$VERSION"
          helm package charts/simplyblock-operator --destination "charts/$VERSION/"

      - name: Update index.yaml
        run: |
          helm repo index charts/ --url https://simplyblock.github.io/helm-charts/charts

      - name: Prepare release metadata
        id: release_meta
        run: |
          echo "branch=release-${{ env.VERSION }}" >> "$GITHUB_OUTPUT"

      - name: Commit and create PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ steps.release_meta.outputs.branch }}"
          git checkout -b "$BRANCH"

          git add charts/index.yaml "charts/${{ env.VERSION }}/"
          git commit -m "helm release for simplyblock-operator ${{ env.VERSION }}" || echo "No changes to commit"
          git push origin "$BRANCH"

          gh pr create \
            --title "Helm release: ${{ env.VERSION }}" \
            --body "Automated Helm release for simplyblock-operator ${{ env.VERSION }}" \
            --head "$BRANCH" \
            --base main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
