name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint
        run: helm lint charts/simplyblock-operator

      - name: Template
        run: helm template simplyblock-operator charts/simplyblock-operator
