name: Manifests (operator)

on:
  push:
    branches:
      - main
    paths:
      - "operator/**"
      - ".github/workflows/manifests.yaml"
  pull_request:
    paths:
      - "operator/**"
      - ".github/workflows/manifests.yaml"

jobs:
  manifests:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - name: Clone the code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: operator/go.mod

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.7.0"
          KUBECONFORM_SHA256="c31518ddd122663b3f3aa874cfe8178cb0988de944f29c74a0b9260920d115d3"
          curl -fsSL -o kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  kubeconform.tar.gz" | sha256sum -c -
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Check generated manifests are up to date
        run: |
          make manifests generate
          git diff --exit-code || (echo "Generated files are out of date. Run 'make manifests generate' and commit the result." && exit 1)

      - name: Build installer
        run: |
          make build-installer
          git diff --exit-code || (echo "dist/install.yaml is out of date. Run 'make build-installer' and commit the result." && exit 1)

      - name: Validate rendered manifests
        run: |
          kubeconform -strict -summary -skip CustomResourceDefinition dist/install.yaml