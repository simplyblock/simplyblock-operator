# Pinned hashes guarding dev tools downloaded by scripts/tools.sh against
# tampering / supply-chain injection.
#
# One row per tool/version/platform:
#   <tool> <version> <os> <arch> <hash>
#
# The <hash> is self-describing via its prefix:
#   * sha256:<hex>   - prebuilt "binary" tools (golangci-lint, kustomize, yq);
#                      the sha256 of the release artifact, one row per os/arch.
#   * h1:<base64>    - "go" tools (controller-gen, setup-envtest); the main
#                      module's go.sum checksum (same content hash Go's checksum
#                      DB protects), pinned once as "<tool> <version> module all".
#
# Regenerate/extend for a tool+version with:
#   scripts/tools.sh lock <tool> <version>
#
# When a row exists the install is verified against it (a mismatch is fatal).
# When a row is missing scripts/tools.sh warns and prints the computed hash,
# unless TOOLS_STRICT=1 which makes the missing entry fatal (use this in CI).
