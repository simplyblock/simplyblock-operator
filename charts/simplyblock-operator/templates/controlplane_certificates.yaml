{{- if and .Values.tls.enabled (eq .Values.tls.provider "cert-manager") }}
{{- if index .Values.tls "cert-manager" "createSelfSignedIssuer" }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ index .Values.tls "cert-manager" "cluster-issuer" | quote }}
spec:
  selfSigned: {}
{{- end }}
---
# The CA Certificate must live in the cert-manager namespace so that the
# ClusterIssuer below can read its backing secret. ClusterIssuers always look
# for CA secrets in the namespace where cert-manager itself is running.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: simplyblock-certificate-authority
  namespace: {{ index .Values.tls "cert-manager" "namespace" }}
spec:
  isCA: true
  commonName: simplyblock-certificate-authority
  secretName: simplyblock-certificate-authority-tls
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    kind: ClusterIssuer
    name: {{ index .Values.tls "cert-manager" "cluster-issuer" | quote }}
---
# ClusterIssuer is cluster-scoped; namespace in metadata is ignored.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: simplyblock-certificate-authority-issuer
spec:
  ca:
    secretName: simplyblock-certificate-authority-tls
---
# CA bundle certificate in the release namespace. Pods cannot mount secrets
# across namespaces, so this certificate (issued by the ClusterIssuer above)
# places a secret containing ca.crt into the release namespace for volume mounts.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: simplyblock-ca-bundle
  namespace: {{ .Release.Namespace }}
spec:
  secretName: simplyblock-ca-bundle-tls
  commonName: simplyblock-ca-bundle
  issuerRef:
    kind: ClusterIssuer
    name: simplyblock-certificate-authority-issuer
  usages:
    - digital signature
    - key encipherment
{{- if .Values.tls.mutual_enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: simplyblock-prometheus-client
  namespace: {{ .Release.Namespace }}
spec:
  commonName: simplyblock-prometheus
  secretName: simplyblock-prometheus-client-tls
  issuerRef:
    kind: ClusterIssuer
    name: simplyblock-certificate-authority-issuer
  usages:
    - digital signature
    - key encipherment
    - client auth
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: simplyblock-operator-client
  namespace: {{ .Release.Namespace }}
spec:
  commonName: simplyblock-operator
  secretName: simplyblock-operator-client-tls
  issuerRef:
    kind: ClusterIssuer
    name: simplyblock-certificate-authority-issuer
  usages:
    - digital signature
    - key encipherment
    - client auth
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: simplyblock-csi-node-client
  namespace: {{ .Release.Namespace }}
spec:
  commonName: simplyblock-csi-node
  secretName: simplyblock-csi-node-client-tls
  issuerRef:
    kind: ClusterIssuer
    name: simplyblock-certificate-authority-issuer
  usages:
    - digital signature
    - key encipherment
    - client auth
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: simplyblock-csi-controller-client
  namespace: {{ .Release.Namespace }}
spec:
  commonName: simplyblock-csi-controller
  secretName: simplyblock-csi-controller-client-tls
  issuerRef:
    kind: ClusterIssuer
    name: simplyblock-certificate-authority-issuer
  usages:
    - digital signature
    - key encipherment
    - client auth
{{- end }}
{{- end }}
