# This rule is not used by the project simplyblock-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over storage.simplyblock.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: simplyblock-operator
    app.kubernetes.io/managed-by: Helm
  name: pool-admin-role
rules:
- apiGroups:
  - storage.simplyblock.io
  resources:
  - pools
  verbs:
  - '*'
- apiGroups:
  - storage.simplyblock.io
  resources:
  - pools/status
  verbs:
  - get
