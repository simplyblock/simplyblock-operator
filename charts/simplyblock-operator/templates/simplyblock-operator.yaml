{{- if .Values.operator.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplyblock-operator
  labels:
    control-plane: simplyblock-operator
    app: simplyblock-operator
spec:
  selector:
    matchLabels:
      app: simplyblock-operator
  replicas: 1
  template:
    metadata:
      annotations:
        log-collector/enabled: "true"
      labels:
        control-plane: simplyblock-operator
        app: simplyblock-operator
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      serviceAccountName: simplyblock-operator
      {{- if .Values.controlplane.nodeSelector.create }}
      nodeSelector:
        {{ .Values.controlplane.nodeSelector.key }}: {{ .Values.controlplane.nodeSelector.value }}
      {{- end }}
      {{- if .Values.controlplane.tolerations.create }}
      tolerations:
      {{- range .Values.controlplane.tolerations.list }}
      - operator: {{ .operator | quote }}
        {{- if .effect }}
        effect: {{ .effect | quote }}
        {{- end }}
        {{- if .key }}
        key: {{ .key | quote }}
        {{- end }}
        {{- if .value }}
        value: {{ .value | quote }}
        {{- end }}
      {{- end }}
      {{- end }} 
      containers:
        - image: "{{ .Values.image.operator.repository }}:{{ .Values.image.operator.tag }}"
          imagePullPolicy: {{ .Values.image.operator.pullPolicy }}
          name: manager
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- include "simplyblock.tlsEnv" . | nindent 12 }}
          resources:
            limits:
              cpu: 800m
              memory: 512Mi
            requests:
              cpu: 500m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            privileged: false
          {{- if .Values.tls.enabled }}
          volumeMounts:
            {{- include "simplyblock.tlsVolumeMount" . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- if .Values.tls.enabled }}
      volumes:
        {{- include "simplyblock.clientTlsVolume" (dict "ctx" . "clientSecret" "simplyblock-operator-client-tls") | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10

################# ROLE AND ROLE BINDING ##############################
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: simplyblock-operator

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: simplyblock-operator-leader-election-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: simplyblock-operator-leader-election-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: simplyblock-operator-leader-election-role
subjects:
- kind: ServiceAccount
  name: simplyblock-operator
  namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: simplyblock-operator-clusterrole
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - events
  - persistentvolumeclaims
  - pods
  - pods/exec
  - namespaces
  - secrets
  - services
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - daemonsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
{{- if and .Values.tls.enabled (eq .Values.tls.provider "cert-manager") }}
- apiGroups:
  - cert-manager.io
  resources:
  - certificates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
{{- end }}
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - persistentvolumes
  verbs:
  - create
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - "rbac.authorization.k8s.io"
  resources:
  - roles
  - clusterroles
  verbs:
  - create
  - delete
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - "rbac.authorization.k8s.io"
  resources:
  - rolebindings
  - clusterrolebindings
  verbs:
  - create
  - delete
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
