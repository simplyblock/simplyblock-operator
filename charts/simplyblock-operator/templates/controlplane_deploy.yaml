---
{{- if .Values.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplyblock-admin-control
  namespace: {{ .Release.Namespace }}
  annotations:
    reloader.stakater.com/auto: "true"
    reloader.stakater.com/configmap: "simplyblock-fdb-cluster-config"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: simplyblock-admin-control
  template:
    metadata:
      annotations:
        log-collector/enabled: "true"
      labels:
        app: simplyblock-admin-control
    spec:
      serviceAccountName: simplyblock-sa
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet 
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: simplyblock-admin-control
              topologyKey: kubernetes.io/hostname

      {{- if .Values.controlplane.nodeSelector.create }}
      nodeSelector:
        {{ .Values.controlplane.nodeSelector.key }}: {{ .Values.controlplane.nodeSelector.value }}
      {{- end }}
      {{- if .Values.controlplane.tolerations.create }}
      tolerations:
      {{- range .Values.controlplane.tolerations.list }}
      - operator: {{ .operator | quote }}
        {{- if .effect }}
        effect: {{ .effect | quote }}
        {{- end }}
        {{- if .key }}
        key: {{ .key | quote }}
        {{- end }}
        {{- if .value }}
        value: {{ .value | quote }}
        {{- end }}
      {{- end }}
      {{- end }}  
      containers:
      - name: simplyblock-control
        image: "{{ .Values.image.simplyblock.repository }}:{{ .Values.image.simplyblock.tag }}"
        imagePullPolicy: "{{ .Values.image.simplyblock.pullPolicy }}"
        command: ["/bin/bash", "-c", "trap : TERM INT; sleep infinity & wait"]
        env:
        {{- include "simplyblock.tlsEnv" . | nindent 8 }}
        - name: LVOL_NVMF_PORT_START
          value: "{{ .Values.controlplane.ports.lvolNvmfPortStart }}"
        - name: PROMETHEUS_URL
          value: "{{ .Values.prometheus.simplyblock.prometheusURL }}"
        - name: PROMETHEUS_PORT
          value: "{{ .Values.prometheus.simplyblock.prometheusPORT }}"
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
{{- if .Values.controlplane.observability.enabled }}
        - name: MONITORING_SECRET
          valueFrom:
            secretKeyRef:
              name: simplyblock-grafana-secrets
              key: MONITORING_SECRET
{{- end }}
        - name: SIMPLYBLOCK_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: simplyblock-config
              key: LOG_LEVEL
        volumeMounts:
        - name: fdb-cluster-file
          mountPath: /etc/foundationdb/fdb.cluster
          subPath: fdb.cluster
        {{- include "simplyblock.tlsVolumeMount" . | nindent 8 }}
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "600m"
            memory: "1Gi"
      volumes:
      - name: fdb-cluster-file
        configMap:
          name: simplyblock-fdb-cluster-config
          items:
            - key: cluster-file
              path: fdb.cluster
      {{- include "simplyblock.tlsVolume" (dict "ctx" . "secret" "simplyblock-webappapi-tls") | nindent 6 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplyblock-webappapi
  namespace: {{ .Release.Namespace }}
  annotations:
    reloader.stakater.com/auto: "true"
    reloader.stakater.com/configmap: "simplyblock-fdb-cluster-config"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: simplyblock-webappapi
  template:
    metadata:
      annotations:
        log-collector/enabled: "true"
      labels:
        app: simplyblock-webappapi
    spec:
      serviceAccountName: simplyblock-sa
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: simplyblock-webappapi
              topologyKey: kubernetes.io/hostname   
      {{- if .Values.controlplane.nodeSelector.create }}
      nodeSelector:
        {{ .Values.controlplane.nodeSelector.key }}: {{ .Values.controlplane.nodeSelector.value }}
      {{- end }}
      {{- if .Values.controlplane.tolerations.create }}
      tolerations:
      {{- range .Values.controlplane.tolerations.list }}
      - operator: {{ .operator | quote }}
        {{- if .effect }}
        effect: {{ .effect | quote }}
        {{- end }}
        {{- if .key }}
        key: {{ .key | quote }}
        {{- end }}
        {{- if .value }}
        value: {{ .value | quote }}
        {{- end }}
      {{- end }}
      {{- end }}     
      containers:
      - name: webappapi
        image: "{{ .Values.image.simplyblock.repository }}:{{ .Values.image.simplyblock.tag }}"
        imagePullPolicy: "{{ .Values.image.simplyblock.pullPolicy }}"
        ports:
        - containerPort: 5000
        command: ["python3", "simplyblock_web/app.py"]
        env:
        - name: SIMPLYBLOCK_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: simplyblock-config
              key: LOG_LEVEL
        - name: LVOL_NVMF_PORT_START
          value: "{{ .Values.controlplane.ports.lvolNvmfPortStart }}"
        - name: ENABLE_MONITORING
          value: "{{ .Values.controlplane.observability.enabled }}"
        - name: PROMETHEUS_URL
          value: "{{ .Values.prometheus.simplyblock.prometheusURL }}"
        - name: PROMETHEUS_PORT
          value: "{{ .Values.prometheus.simplyblock.prometheusPORT }}"
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- include "simplyblock.tlsEnv" . | nindent 8 }}
{{- if .Values.controlplane.observability.enabled }}
        - name: MONITORING_SECRET
          valueFrom:
            secretKeyRef:
              name: simplyblock-grafana-secrets
              key: MONITORING_SECRET
{{- end }}
        - name: FLASK_DEBUG
          value: "False"
        - name: FLASK_ENV
          value: "production"
        volumeMounts:
        - name: fdb-cluster-file
          mountPath: /etc/foundationdb/fdb.cluster
          subPath: fdb.cluster
        {{- include "simplyblock.tlsVolumeMount" . | nindent 8 }}
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "2Gi"
      volumes:
      - name: fdb-cluster-file
        configMap:
          name: simplyblock-fdb-cluster-config
          items:
            - key: cluster-file
              path: fdb.cluster
      {{- include "simplyblock.tlsVolume" (dict "ctx" . "secret" "simplyblock-webappapi-tls") | nindent 6 }}
