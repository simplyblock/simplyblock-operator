---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: simplyblock-minio
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: simplyblock-minio
  replicas: 1
  selector:
    matchLabels:
      app: simplyblock-minio
  template:
    metadata:
      labels:
        app: simplyblock-minio
    spec:
      {{- if .Values.controlplane.nodeSelector.create }}
      nodeSelector:
        {{ .Values.controlplane.nodeSelector.key }}: {{ .Values.controlplane.nodeSelector.value }}
      {{- end }}
      containers:
        - name: minio
          image: "{{ .Values.controlplane.observability.minio.repository }}:{{ .Values.controlplane.observability.minio.tag }}"
          imagePullPolicy: {{ .Values.controlplane.observability.minio.pullPolicy }}
          args:
            - server
            - /data
            - --console-address=:9001
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.controlplane.observability.minio.accessKey | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.controlplane.observability.minio.secretKey | quote }}
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
        - name: bucket-init
          image: "{{ .Values.controlplane.observability.minio.mcRepository }}:{{ .Values.controlplane.observability.minio.mcTag }}"
          imagePullPolicy: {{ .Values.controlplane.observability.minio.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until mc alias set local http://localhost:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "Waiting for MinIO..."; sleep 3;
              done
              mc mb --ignore-existing local/{{ .Values.controlplane.observability.minio.bucket }}
              sleep infinity
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.controlplane.observability.minio.accessKey | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.controlplane.observability.minio.secretKey | quote }}
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.controlplane.observability.minio.storageSize }}
        {{- if .Values.controlplane.observability.minio.storageClass }}
        storageClassName: {{ .Values.controlplane.observability.minio.storageClass }}
        {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: simplyblock-minio
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: simplyblock-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001

---
{{- if .Values.controlplane.observability.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplyblock-graylog
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simplyblock-graylog
  template:
    metadata:
      labels:
        app: simplyblock-graylog
    spec:      
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1100
        supplementalGroups:
          - 0 
      {{- if .Values.controlplane.nodeSelector.create }}
      nodeSelector:
        {{ .Values.controlplane.nodeSelector.key }}: {{ .Values.controlplane.nodeSelector.value }}
      {{- end }}
      {{- if .Values.controlplane.tolerations.create }}
      tolerations:
      {{- range .Values.controlplane.tolerations.list }}
      - operator: {{ .operator | quote }}
        {{- if .effect }}
        effect: {{ .effect | quote }}
        {{- end }}
        {{- if .key }}
        key: {{ .key | quote }}
        {{- end }}
        {{- if .value }}
        value: {{ .value | quote }}
        {{- end }}
      {{- end }}
      {{- end }} 
      containers:
        - name: graylog
          image: "{{ .Values.controlplane.observability.graylog.repository }}:{{ .Values.controlplane.observability.graylog.tag }}"
          command: ["/usr/bin/tini", "--"]
          args: ["wait-for-it", "opensearch-cluster-master:9200", "--", "/docker-entrypoint.sh"]
          env:
            - name: GRAYLOG_NODE_ID_FILE
              value: "/usr/share/graylog/data/config/node-id"
            - name: GRAYLOG_PASSWORD_SECRET
              valueFrom:
                secretKeyRef:
                  name: simplyblock-graylog-secret
                  key: GRAYLOG_PASSWORD_SECRET
            - name: GRAYLOG_ROOT_PASSWORD_SHA2
              valueFrom:
                secretKeyRef:
                  name: simplyblock-graylog-secret
                  key: GRAYLOG_ROOT_PASSWORD_SHA2
            - name: GRAYLOG_HTTP_BIND_ADDRESS
              value: "0.0.0.0:9000"
            - name: GRAYLOG_HTTP_EXTERNAL_URI
              value: "http://localhost:9000/"
            - name: GRAYLOG_ELASTICSEARCH_HOSTS
              value: "http://opensearch-cluster-master:9200"
            - name: GRAYLOG_MONGODB_URI
              value: "mongodb://admin:{{ .Values.controlplane.observability.secret }}@simplyblock-mongo-svc:27017/graylog"
            - name: GRAYLOG_SKIP_PREFLIGHT_CHECKS
              value: "true"
            - name: GRAYLOG_ROTATION_STRATEGY
              value: "time"
            - name: GRAYLOG_RETENTION_STRATEGY
              value: "delete"
            - name: GRAYLOG_ELASTICSEARCH_MAX_NUMBER_OF_INDICES
              valueFrom:
                secretKeyRef:
                  name: simplyblock-graylog-secret
                  key: MAX_NUMBER_OF_INDICES
            - name: GRAYLOG_ELASTICSEARCH_MAX_TIME_PER_INDEX
              value: "1d"
            - name: GRAYLOG_RING_SIZE
              value: "4096"
            - name: GRAYLOG_INPUTBUFFER_RING_SIZE
              value: "8192"
            - name: GRAYLOG_VERSIONCHECKS
              value: "false"
            - name: GRAYLOG_ELASTICSEARCH_REPLICAS
              value: "1"
            - name: GRAYLOG_MESSAGE_JOURNAL_MAX_SIZE
              value: "10gb"
          ports:
            - containerPort: 5044
            - containerPort: 5140
              protocol: UDP
            - containerPort: 5140
            - containerPort: 5555
            - containerPort: 5555
              protocol: UDP
            - containerPort: 12201
            - containerPort: 12201
              protocol: UDP
            - containerPort: 13301
            - containerPort: 13302
          volumeMounts:
            - mountPath: /usr/share/graylog/data/data
              name: simplyblock-graylog-data
            - mountPath: /usr/share/graylog/data/journal
              name: simplyblock-graylog-journal
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "400m"
              memory: "2Gi"
      volumes:
        - name: simplyblock-graylog-data
          emptyDir: {}
        - name: simplyblock-graylog-journal
          emptyDir: {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplyblock-thanos
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simplyblock-thanos
  template:
    metadata:
      labels:
        app: simplyblock-thanos
    spec:
      {{- if .Values.controlplane.nodeSelector.create }}
      nodeSelector:
        {{ .Values.controlplane.nodeSelector.key }}: {{ .Values.controlplane.nodeSelector.value }}
      {{- end }}
      {{- if .Values.controlplane.tolerations.create }}
      tolerations:
      {{- range .Values.controlplane.tolerations.list }}
      - operator: {{ .operator | quote }}
        {{- if .effect }}
        effect: {{ .effect | quote }}
        {{- end }}
        {{- if .key }}
        key: {{ .key | quote }}
        {{- end }}
        {{- if .value }}
        value: {{ .value | quote }}
        {{- end }}
      {{- end }}
      {{- end }}
      containers:
        - name: thanos-store
          image: "{{ .Values.controlplane.observability.thanos.repository }}:{{ .Values.controlplane.observability.thanos.tag }}"
          args:
            - store
            - --grpc-address=0.0.0.0:10901
            - --http-address=0.0.0.0:10902
            - --objstore.config-file=/etc/thanos/objstore.yml
            - --index-cache-size=500MB
            - --chunk-pool-size=500MB
          ports:
            - name: store-grpc
              containerPort: 10901
            - name: store-http
              containerPort: 10902
          volumeMounts:
            - name: objstore-config
              mountPath: /etc/thanos
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "1Gi"

        - name: thanos-query
          image: "{{ .Values.controlplane.observability.thanos.repository }}:{{ .Values.controlplane.observability.thanos.tag }}"
          args:
            - query
            - --grpc-address=0.0.0.0:10911
            - --http-address=0.0.0.0:9091
            - --query.replica-label=replica
            - --store=simplyblock-thanos:10901
            {{- $replicas := int .Values.prometheus.server.replicaCount }}
            {{- $ns := .Release.Namespace }}
            {{- range $i := until $replicas }}
            - --store=simplyblock-prometheus-{{ $i }}.simplyblock-prometheus-headless.{{ $ns }}.svc.cluster.local:10901
            {{- end }}
          ports:
            - containerPort: 9091
              name: query-http
            - containerPort: 10911
              name: query-grpc
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "1Gi"

        - name: thanos-compactor
          image: "{{ .Values.controlplane.observability.thanos.repository }}:{{ .Values.controlplane.observability.thanos.tag }}"
          args:
            - compact
            - --http-address=0.0.0.0:10922
            - --data-dir=/data
            - --objstore.config-file=/etc/thanos/objstore.yml
            - --retention.resolution-raw=30d
            - --retention.resolution-5m=60d
            - --retention.resolution-1h=90d
            - --compact.concurrency=1
            - --wait
          ports:
            - containerPort: 10922
              name: compact-http
          volumeMounts:
            - name: objstore-config
              mountPath: /etc/thanos
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "1Gi"

      volumes:
        - name: objstore-config
          configMap:
            name: simplyblock-objstore-config

        - name: data
          emptyDir: {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplyblock-grafana
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simplyblock-grafana
  template:
    metadata:
      labels:
        app: simplyblock-grafana
    spec:      
      securityContext:
        fsGroup: 472
        supplementalGroups:
          - 0
      {{- if .Values.controlplane.nodeSelector.create }}
      nodeSelector:
        {{ .Values.controlplane.nodeSelector.key }}: {{ .Values.controlplane.nodeSelector.value }}
      {{- end }}
      {{- if .Values.controlplane.tolerations.create }}
      tolerations:
      {{- range .Values.controlplane.tolerations.list }}
      - operator: {{ .operator | quote }}
        {{- if .effect }}
        effect: {{ .effect | quote }}
        {{- end }}
        {{- if .key }}
        key: {{ .key | quote }}
        {{- end }}
        {{- if .value }}
        value: {{ .value | quote }}
        {{- end }}
      {{- end }}
      {{- end }} 
      containers:
        - name: grafana
          image: "{{ .Values.controlplane.observability.grafana.repository }}:{{ .Values.controlplane.observability.grafana.tag }}"
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: simplyblock-grafana-secrets
                  key: MONITORING_SECRET
            - name: GF_ALERTING_ENABLED
              value: "true"
            - name: GF_PATHS_PROVISIONING
              value: "/etc/grafana/provisioning"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:3000"
          volumeMounts:
            - name: datasource-config
              mountPath: /etc/grafana/provisioning/datasources
            - name: alerting-config
              mountPath: /etc/grafana/provisioning/alerting
            - name: dashboard-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-cluster
              mountPath: /var/lib/grafana/dashboards/cluster.json
              subPath: cluster.json
            - name: dashboard-devices
              mountPath: /var/lib/grafana/dashboards/devices.json
              subPath: devices.json
            - name: dashboard-lvols
              mountPath: /var/lib/grafana/dashboards/lvols.json
              subPath: lvols.json
            - name: dashboard-nodes
              mountPath: /var/lib/grafana/dashboards/nodes.json
              subPath: nodes.json
            - name: dashboard-pools
              mountPath: /var/lib/grafana/dashboards/pools.json
              subPath: pools.json
            - name: grafana-data
              mountPath: /var/lib/grafana
      volumes:
        - name: datasource-config
          configMap:
            name: simplyblock-grafana-datasource
        - name: alerting-config
          configMap:
            name: simplyblock-grafana-alerting
        - name: dashboard-config
          configMap:
            name: simplyblock-grafana-dashboard-config
        - name: dashboard-cluster
          configMap:
            name: simplyblock-grafana-dashboard-cluster
        - name: dashboard-devices
          configMap:
            name: simplyblock-grafana-dashboard-devices
        - name: dashboard-lvols
          configMap:
            name: simplyblock-grafana-dashboard-lvols
        - name: dashboard-nodes
          configMap:
            name: simplyblock-grafana-dashboard-nodes
        - name: dashboard-pools
          configMap:
            name: simplyblock-grafana-dashboard-pools
        - name: grafana-data
          emptyDir: {}

---
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: simplyblock-mongo
  namespace: {{ .Release.Namespace }}
spec:
  members: 1
  type: ReplicaSet
  version: "7.0.5"
  statefulSet:
    spec:
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: [ "ReadWriteOnce" ]
            {{- if .Values.controlplane.storageclass.name }}
            storageClassName: {{ .Values.controlplane.storageclass.name }}
            {{- end }}
            resources:
              requests:
                storage: 5Gi
        - metadata:
            name: logs-volume
          spec:
            accessModes: [ "ReadWriteOnce" ]
            {{- if .Values.controlplane.storageclass.name }}
            storageClassName: {{ .Values.controlplane.storageclass.name }}
            {{- end }}
            resources:
              requests:
                storage: 5Gi
  security:
    authentication:
      modes: ["SCRAM"]
  users:
    - name: admin
      db: graylog
      passwordSecretRef:
        name: admin-password
      roles:
        - name: readWrite
          db: graylog
        - name: clusterAdmin
          db: admin
        - name: userAdminAnyDatabase
          db: admin
      scramCredentialsSecretName: my-scram
  additionalMongodConfig:
    storage.wiredTiger.engineConfig.journalCompressor: zlib
---
apiVersion: v1
kind: Secret
metadata:
  name: admin-password
type: Opaque
stringData:
  password: {{ .Values.controlplane.observability.secret }}
{{- end }}
{{- end }}
