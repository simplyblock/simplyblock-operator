  prometheus-pushgateway:
    enabled: false

  prometheus-node-exporter:
    enabled: false

  kube-state-metrics:
    enabled: false
  configmapReload:
    prometheus:
      image:
        repository: quay.io/simplyblock-io/prometheus-config-reloader
        tag: v0.72.0

  defaultBackend:
    enabled: false
    name: defaultbackend
    image:
      registry: "quay.io/simplyblock-io"
      image: defaultbackend-amd64
      tag: "1.5"
tls:
  enabled: false

  # Provider responsible for issuing serving certificates. One of: openshift, cert-manager. Required if enabled.
  provider: cert-manager

  # Required if provider == cert-manager. Names a ClusterIssuer used to mint
  # the chart's own CA Certificate.
  cert-manager:
    # When true, the chart creates a self-signed ClusterIssuer whose name is
    # given by cluster-issuer. Set to false to use an issuer you created yourself.
    createSelfSignedIssuer: true
    cluster-issuer: selfsigned
    # Namespace where cert-manager is installed. The chart's CA secret is placed
    # here so that the ClusterIssuer can locate it (ClusterIssuers always read CA
    # secrets from the cert-manager controller namespace).
    namespace: cert-manager

  # Mutual TLS (clients present and verify certificates). Only allowed when provider == cert-manager.
  mutual_enabled: false
